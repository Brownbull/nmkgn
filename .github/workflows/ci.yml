name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen
      - run: uv run ruff check api/
      - run: uv run ruff format --check api/ tests/

  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nmkgn
          POSTGRES_PASSWORD: nmkgn
          POSTGRES_DB: nmkgn
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U nmkgn"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql+psycopg://nmkgn:nmkgn@localhost:5432/nmkgn
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen
      - run: uv run alembic -c api/migrations/alembic.ini upgrade head
      - run: uv run pytest tests/api/ -x --tb=short -q

  e2e-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [api-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen
      - run: uv run playwright install --with-deps chromium
      - run: uv run pytest tests/e2e/ -v --browser chromium
        env:
          E2E_BASE_URL: https://nmkgn-app-production.up.railway.app

name: nmkgn

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nmkgn
      POSTGRES_USER: nmkgn
      POSTGRES_PASSWORD: nmkgn
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - nmkgn-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nmkgn -d nmkgn"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nmkgn-postgres-data:

<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>letra. · Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --paper: #fafaf7;
    --paper-2: #f1f0eb;
    --paper-3: #e8e6df;
    --ink: #1a1d24;
    --ink-soft: #4f5562;
    --ink-faint: #8b91a0;
    --line: #e6e4dc;
    --line-2: #d8d5cb;
    --accent: #246a5b;
    --accent-soft: #d9e8e3;
    --accent-2: #5fa093;
    --red: #b8442e;
    --red-soft: #fbe7e1;
    --amber: #a87420;
    --amber-soft: #fbeed3;
    --green: #2c6b3f;
    --green-soft: #d6e8d9;
  }
  html, body { margin:0; padding:0; background:var(--paper); height:100%; }
  body {
    font-family: 'Manrope', system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow:hidden;
  }
  #root { height:100vh; }

  /* letra. visual system — same as main flow */
  .lt { width:100%; min-height:100%; background: var(--paper); color: var(--ink); position:relative; box-sizing:border-box; font-family: 'Manrope', system-ui, sans-serif; }
  .lt .display { font-family: 'Manrope'; font-weight:700; letter-spacing:-0.025em; line-height:1.1; }
  .lt .label   { font-family: 'Manrope'; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; font-size:10px; color: var(--ink-faint); }
  .lt .num     { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum","lnum"; font-weight:500; letter-spacing:-0.01em; }
  .lt .card    { background:#fff; border:1px solid var(--line); border-radius:14px; }
  .lt .card-soft { background: var(--paper-2); border:1px solid transparent; border-radius:14px; }
  .lt .pill    { display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:999px; background: var(--paper-2); font-size:11px; font-weight:600; color: var(--ink-soft); }
  .lt .pill-accent { background: var(--accent-soft); color: var(--accent); }
  .lt .pill-red    { background: var(--red-soft);    color: var(--red); }
  .lt .pill-amber  { background: var(--amber-soft);  color: var(--amber); }
  .lt .pill-green  { background: var(--green-soft);  color: var(--green); }
  .lt .btn {
    font-family:'Manrope'; font-weight:600; font-size:14px;
    padding:10px 18px; border:1px solid var(--line);
    background:#fff; color:var(--ink); border-radius:10px;
    cursor:pointer; transition: background .15s, border-color .15s, transform .08s;
    display:inline-flex; align-items:center; gap:8px;
  }
  .lt .btn:hover { background: var(--paper-2); }
  .lt .btn:active { transform: translateY(1px); }
  .lt .btn-primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .lt .btn-primary:hover { background: #0d0f15; }
  .lt .btn-accent  { background: var(--accent); color:#fff; border-color: var(--accent); }
  .lt .btn-accent:hover  { background: #1a594b; }
  .lt .btn-ghost   { background: transparent; border-color: transparent; }
  .lt .btn-small   { padding:6px 12px; font-size:12.5px; border-radius:8px; }
  .lt .btn-xs      { padding:4px 10px; font-size:11.5px; border-radius:7px; }
  .lt .dot-sm { width:6px; height:6px; border-radius:50%; display:inline-block; }
  .lt .divider { height:1px; background: var(--line); }
  .scrollable { overflow:auto; }
  .scrollable::-webkit-scrollbar { width:8px; height:8px; }
  .scrollable::-webkit-scrollbar-thumb { background: var(--line-2); border-radius:4px; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="letra-shared.jsx"></script>
  <script type="text/babel" src="letra-flow.jsx"></script>
  <script type="text/babel" src="letra-plan.jsx"></script>
  <script type="text/babel" src="letra-coach.jsx"></script>
  <script type="text/babel" src="letra-other.jsx"></script>
  <script type="text/babel" src="letra-extras.jsx"></script>
  <script type="text/babel" src="letra-settings.jsx"></script>
  <script type="text/babel" src="letra-deep.jsx"></script>
  <script type="text/babel" src="letra-mobile.jsx"></script>
  <script type="text/babel" src="letra-mobile-extras.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="letra-tweaks.jsx"></script>
  <script type="text/babel" src="letra-proto.jsx"></script>
</body>
</html>
